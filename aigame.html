<!DOCTYPE html>
<html>
<head>
  <title>Wordle</title>

  <style>
    body 
    {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(135deg, #74ebd5, #acb6e5);
      margin: 0;
      padding-top: 40px;
    }

    h1 {
      color: white;
      font-size: 50px;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    }

    .grid {
      margin-top: 30px;
      display: grid;
      grid-template-rows: repeat(6, 50px);
      gap: 6px;
      justify-content: center;
    }

    .row {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .tile {
      width: 50px;
      height: 50px;
      background: white;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      text-transform: uppercase;
    }

    .green { background: #6aaa64; color: white; }
    .yellow { background: #c9b458; color: white; }
    .gray { background: #787c7e; color: white; }

    input {
      margin-top: 20px;
      padding: 12px;
      font-size: 16px;
      text-transform: uppercase;
      border-radius: 8px;
      border: none;
      width: 200px;
      text-align: center;
    }

    button {
      padding: 12px;
      margin-left: 5px;
      border: none;
      border-radius: 8px;
      background: #ff6b6b;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .nav-buttons {
  list-style: none !important;
  display: flex !important;
  justify-content: center !important;
  gap: 15px;
  padding: 15px;
  margin: 0;
}

.nav-buttons li {
  display: inline-block;
}

.nav-btn {
  display: inline-block;
  padding: 10px 18px;
  background-color: #333 !important;
  color: white !important;
  text-decoration: none !important;
  border-radius: 8px;
  font-weight: bold;
  font-family: Arial, sans-serif;
}

.nav-btn:hover {
  background-color: #555 !important;
}

.nav {
            list-style: none;
            padding: 15px;
            margin: 0;
            background-color:#acb6e5;
        }

        
        .nav li {
            display: inline;
            margin: 15px;
        }

        .nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
  </style>
</head>


<body>

  
  
 <!-- Navigation -->
    <ul class="nav">
        <li><a href="index.html">Home</a></li>
        <li><a href="aigame.html">Game</a></li>
    </ul>

    

<h1>WORDLE</h1>

<div class="grid" id="grid"></div>

<input id="guess" maxlength="5" placeholder="5-letter word">
<button onclick="submitGuess()">Guess</button>

<script>
const answer = "PLANT";
let currentRow = 0;

function createGrid() {
  const grid = document.getElementById("grid");

  for (let i = 0; i < 6; i++) {
    const row = document.createElement("div");
    row.classList.add("row");

    for (let j = 0; j < 5; j++) {
      const tile = document.createElement("div");
      tile.classList.add("tile");
      row.appendChild(tile);
    }

    grid.appendChild(row);
  }
}

function submitGuess() {
  const input = document.getElementById("guess");
  const guess = input.value.toUpperCase();
  input.value = "";

  if (guess.length !== 5) {
    alert("Enter a 5-letter word!");
    return;
  }

  const row = document.getElementsByClassName("row")[currentRow];
  const tiles = row.children;

  let answerArr = answer.split("");

  // fill letters + check correct
  for (let i = 0; i < 5; i++) {
    tiles[i].textContent = guess[i];

    if (guess[i] === answer[i]) {
      tiles[i].classList.add("green");
      answerArr[i] = null;
    }
  }

  // check wrong position
  for (let i = 0; i < 5; i++) {
    if (tiles[i].classList.contains("green")) continue;

    if (answerArr.includes(guess[i])) {
      tiles[i].classList.add("yellow");
      answerArr[answerArr.indexOf(guess[i])] = null;
    } else {
      tiles[i].classList.add("gray");
    }
  }

  currentRow++;

  if (guess === answer) {
    setTimeout(() => alert("You win! 🎉"), 100);
  } else if (currentRow === 6) {
    setTimeout(() => alert("Game over! Word was " + answer), 100);
  }
}

createGrid();
</script>


</body>
</html>
